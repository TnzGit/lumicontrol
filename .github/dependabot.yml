version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    # Routine upgrades are reviewed manually; security updates stay enabled.
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /apps/lumi-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
